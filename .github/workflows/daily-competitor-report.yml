name: Daily Competitor Report

on:
  schedule:
    - cron: "30 8 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Report date, or today"
        required: false
        default: "today"
      maxDetails:
        description: "Maximum detail pages per brand"
        required: false
        default: "80"
      minOkPages:
        description: "Fail if fewer listing pages open successfully"
        required: false
        default: "1"

permissions:
  contents: write

concurrency:
  group: daily-competitor-report
  cancel-in-progress: false

jobs:
  build-report:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      REPORT_DATE: ${{ github.event_name == 'workflow_dispatch' && inputs.date || 'today' }}
      MAX_DETAILS: ${{ github.event_name == 'workflow_dispatch' && inputs.maxDetails || '80' }}
      MIN_OK_PAGES: ${{ github.event_name == 'workflow_dispatch' && inputs.minOkPages || '1' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Generate daily report
        run: xvfb-run -a npm run daily -- --date="$REPORT_DATE" --maxDetails="$MAX_DETAILS" --minOkPages="$MIN_OK_PAGES" --browserOnly --headed

      - name: Upload report artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: competitor-report-${{ github.run_id }}
          path: |
            reports/
            docs/
          retention-days: 14

      - name: Commit updated reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports docs package.json package-lock.json src .github/workflows
          if git diff --cached --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "chore: update daily competitor report"
            git push
          fi
